name: job-search-bot

on:
  schedule:
    # Hourly at minute 7 (offset from :00 to avoid GitHub's busy minute)
    - cron: "7 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: job-search-bot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "git hub"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: "git hub/requirements.txt"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Generate config.yaml from example + secret
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "::error::DISCORD_WEBHOOK_URL secret is not set"
            exit 1
          fi
          cp config.example.yaml config.yaml
          python -c "
          import os, re
          p = 'config.yaml'
          s = open(p).read()
          s = re.sub(r'webhook_url:\s*\"\"', 'webhook_url: \"' + os.environ['DISCORD_WEBHOOK_URL'] + '\"', s)
          open(p, 'w').write(s)
          "

      - name: Run bot
        run: python -m bot.main

      - name: Commit updated seen_jobs.db
        run: |
          if [ ! -f seen_jobs.db ]; then
            echo "no seen_jobs.db produced, skipping commit"
            exit 0
          fi
          cd ..
          git config user.name  "job-search-bot"
          git config user.email "job-search-bot@users.noreply.github.com"
          git add "git hub/seen_jobs.db"
          if git diff --staged --quiet; then
            echo "no dedupe changes"
            exit 0
          fi
          git commit -m "Update seen_jobs.db [skip ci]"
          git push
